# Shared Python tooling for the monorepo. Per-project metadata lives in apps/<name>/pyproject.toml.

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["apps/api/src"]
extend-exclude = ["data", ".venv", "dist", "build"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "C4",  # comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101", # use of assert (fine in tests)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S", "B017"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["apps/api/src"]
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
