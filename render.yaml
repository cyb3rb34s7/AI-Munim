databases:
  - name: munim-db
    plan: free
    databaseName: munim
    user: munim
    postgresMajorVersion: "16"

services:
  - type: web
    name: munim
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: munim-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: SHOPIFY_OAUTH_ENABLED
        value: "false"
      # Real Shopify OAuth requires a Partner Dashboard config the
      # reviewer doesn't have; deployed env keeps these as placeholders so
      # config validation passes at startup. Both endpoints raise
      # FeatureDisabledError when SHOPIFY_OAUTH_ENABLED is false, so the
      # placeholder values are never actually used.
      - key: SHOPIFY_CLIENT_ID
        value: deployed-no-oauth
      - key: SHOPIFY_CLIENT_SECRET
        value: deployed-no-oauth
      - key: SHOPIFY_OAUTH_REDIRECT_URI
        value: http://localhost/no-oauth
      - key: SHOPIFY_DEFAULT_SHOP_DOMAIN
        value: example.myshopify.com
      # Self-referential; set this to the Render service URL after first deploy
      # (e.g. https://munim.onrender.com). Used only for the post-OAuth redirect,
      # which is currently gated off by SHOPIFY_OAUTH_ENABLED=false.
      - key: FRONTEND_BASE_URL
        sync: false
